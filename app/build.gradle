plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}
ext {
    lombokVersion = "1.18.34"
    springCloudVersion = "2023.0.3"
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web:3.3.5'
    implementation 'org.springframework.boot:spring-boot-starter-actuator:3.3.5'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa:3.3.5'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server:3.3.5'
    implementation 'org.springframework.boot:spring-boot-starter-security:3.3.5'
    implementation 'org.springframework.boot:spring-boot-starter:3.3.5'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    implementation 'org.springframework.cloud:spring-cloud-starter-bootstrap:4.1.3'

    implementation 'org.modelmapper:modelmapper:3.2.1'

    implementation 'com.mysql:mysql-connector-j:8.3.0'

    implementation "org.projectlombok:lombok:$lombokVersion"
    compileOnly "org.projectlombok:lombok:$lombokVersion"
    annotationProcessor "org.projectlombok:lombok:$lombokVersion"

    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    implementation 'io.jsonwebtoken:jjwt-impl:0.12.6'
    implementation 'io.jsonwebtoken:jjwt-jackson:0.12.6'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
